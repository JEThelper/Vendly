services:
  - type: web
    name: vendly-api-server
    env: node
    buildCommand: pnpm install && pnpm -r run build
    startCommand: cd artifacts/api-server && node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: vendly-redis
          property: connectionString
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: ACCESS_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: debug

  - type: redis
    name: vendly-redis
    ipAllowList: []
    plan: free
    maxmemoryPolicy: noeviction
