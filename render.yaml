services:
  - type: web
    name: vendly-api-server
    env: node
    buildCommand: pnpm install && cd artifacts/api-server && pnpm run build
    startCommand: cd artifacts/api-server && node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: postgresql://vendly_app.dwodcbhzolgvvuzybexx:VendlyAppSecure123!@aws-0-us-east-1.pooler.supabase.com:6543/postgres
      - key: REDIS_URL
        fromService:
          type: redis
          name: vendly-redis
          property: connectionString
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: ACCESS_TOKEN
        sync: false

  - type: redis
    name: vendly-redis
    ipAllowList: []
    plan: free
    maxmemoryPolicy: noeviction
