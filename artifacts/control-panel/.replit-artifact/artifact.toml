kind = "web"
previewPath = "/"
title = "Vendor Control Panel"
version = "1.0.0"
id = "artifacts/control-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23401

[services.development]
run = "pnpm --filter @workspace/control-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/control-panel", "run", "build" ]
publicDir = "artifacts/control-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23401"
BASE_PATH = "/"
